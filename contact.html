<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <link rel="stylesheet" href="web.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>
  <header>
    <nav>
      <canvas id="navParticles"></canvas>

      <a href="web.html" class="logo">
        <img src="ARISE.png" alt="ARISE logo">
      </a>

      <button id="navToggle" class="nav-toggle" aria-label="Toggle navigation">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <ul>
        <li class="ul"><a href="web.html#about">About</a></li>
        <li class="ul"><a href="web.html#programs">Programs</a></li>
        <li class="ul"><a href="blog.html">Blog</a></li>
        <li class="ul"><a href="contact.html">Contact</a></li>
        <button><a href="sponsors.html">Sponsors</a></button>
        <button>Apply Now</button>
      </ul>
    </nav>
  </header>

  <main>
    <section class="contact-section">
      <div class="contact-container">
        <div class="contact-info">
          <h2>Register / Contact Us</h2>
          <p>Please drop your reviews and thoughts.</p>
          <p><strong>Email:</strong> info@ariseict.com</p>
          <p><strong>Phone:</strong> +234 xxx xxx xxxx</p>
        </div>

        <form id="contactForm" class="contact-form" method="POST" action="https://formspree.io/f/yourFormId">
          <label for="name">Full name</label>
          <input type="text" id="name" name="name" required>

          <label for="email">Email address</label>
          <input type="email" id="email" name="email" required>

          <!-- <label for="program">Program of interest</label>
          <select id="program" name="program" required>
            <option value="">Choose a program</option>
            <option>Web Development</option>
            <option>Data Analysis</option>
            <option>AI Essentials</option>
            <option>Computer Basics</option>
          </select> -->

          <label for="message">Message (optional)</label>
          <textarea id="message" name="message" rows="4"></textarea>

          <button type="submit" id="submitBtn">Register / Send</button>

          <p id="formStatus" class="form-status" aria-live="polite"></p>
        </form>
      </div>
    </section>
  </main>

  <footer class="footer">
    <div class="footer-container">
      <div class="footer-contact">
        <p>
          <i class="fa-solid fa-envelope"></i>
          Email: info@ariseict.com
        </p>
        <p>
          <i class="fa-solid fa-phone"></i>
          Phone: +234 xxx xxx xxxx
        </p>
      </div>

      <div class="footer-social">
        <a href="#">
          <i class="fa-brands fa-facebook"></i> Facebook
        </a>
        <a href="#">
        </a>
      </div>
    </div>

    <p class="copyright">
      &copy; 2025 ARISE ICT HUB
    </p>
  </footer>

  <script src="web.js"></script>
</body>

</html>
